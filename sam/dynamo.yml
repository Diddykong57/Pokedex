AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: Pokedex table.

Parameters:
    ServiceName:
        Type: String
        Description: Name of the service
    StackSuffix:
        Type: String
        Description: Suffix of stack name (env or env-prId)

Resources:
    Table:
        Type: AWS::DynamoDB::Table
        DeletionPolicy: Delete
        UpdateReplacePolicy: Delete
        Properties:
            TableName: !Sub "${ServiceName}-${StackSuffix}"
            SSESpecification:
                SSEEnabled: true
            AttributeDefinitions:
                - AttributeName: "PK"
                  AttributeType: "S"
                - AttributeName: "SK"
                  AttributeType: "S"
                - AttributeName: "GSI1"
                  AttributeType: "S"
            KeySchema:
                - AttributeName: "PK"
                  KeyType: "HASH"
                - AttributeName: "SK"
                  KeyType: "RANGE"
            BillingMode: "PAY_PER_REQUEST"
            GlobalSecondaryIndexes:
                - IndexName: "GSI1"
                  KeySchema:
                      - AttributeName: "GSI1"
                        KeyType: "HASH"
                  Projection:
                      ProjectionType: "ALL"

Outputs:
    TableArn:
        Description: Table ARN
        Value: !GetAtt Table.Arn
    TableName:
        Description: Table
        Value: !Ref Table
