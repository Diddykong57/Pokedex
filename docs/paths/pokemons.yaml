pokemonCollection:
  get:
    tags:
      - Pokemon
    summary: Get authenticated user's Pokémon
    security:
      - cognitoAuth:
          - openid
          - email
    responses:
      '200':
        description: Pokémon list retrieved successfully
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas/pokemon.yaml#/PokemonListResponse'
      '401':
        description: Unauthorized

  post:
    tags:
      - Pokemon
    summary: Create a Pokémon for authenticated user
    security:
      - cognitoAuth:
          - openid
          - email
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/pokemon.yaml#/CreatePokemonRequest'
    responses:
      '201':
        description: Pokémon created successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/pokemon.yaml#/PokemonResponse'
      '400':
        description: Invalid request body
      '401':
        description: Unauthorized
      '409':
        description: Pokémon already exists

pokemonItem:
  get:
    tags:
      - Pokemon
    summary: Get authenticated user's Pokémon details by ID
    security:
      - cognitoAuth:
          - openid
          - email
    parameters:
      - name: id
        in: path
        required: true
        description: Pokémon unique identifier
        schema:
          type: string
    responses:
      '200':
        description: Pokémon found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/pokemon.yaml#/PokemonResponse'
      '401':
        description: Unauthorized
      '404':
        description: Pokémon not found

  put:
    tags:
      - Pokemon
    summary: Update authenticated user's Pokémon
    security:
      - cognitoAuth:
          - openid
          - email
    parameters:
      - name: id
        in: path
        required: true
        description: Pokémon unique identifier
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/pokemon.yaml#/UpdatePokemonRequest'
    responses:
      '200':
        description: Pokémon updated successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/pokemon.yaml#/PokemonResponse'
      '400':
        description: Invalid request body
      '401':
        description: Unauthorized
      '404':
        description: Pokémon not found

  delete:
    tags:
      - Pokemon
    summary: Delete authenticated user's Pokémon
    security:
      - cognitoAuth:
          - openid
          - email
    parameters:
      - name: id
        in: path
        required: true
        description: Pokémon unique identifier
        schema:
          type: string
    responses:
      '204':
        description: Pokémon deleted successfully
      '401':
        description: Unauthorized
      '404':
        description: Pokémon not found