openapi: 3.0.3

info:
  title: Pokedex API
  version: 2.0.0
  description: REST API for managing a user Pokémon collection.

servers:
  - url: https://9f1ws5ee1g.execute-api.eu-west-3.amazonaws.com/prod

tags:
  - name: HealthCheck
    description: API availability check
  - name: Pokemon
    description: Pokémon management
  - name: User
    description: User management

paths:
  /healthCheck:
    get:
      tags:
        - HealthCheck
      summary: Check API health status
      responses:
        '200':
          description: API is running

  /users/me/pokemons:
    get:
      tags:
        - Pokemon
      summary: Get authenticated user's Pokémon
      security:
        - cognitoAuth:
            - openid
            - email
      responses:
        '200':
          description: Pokémon list retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PokemonListResponse'
        '401':
          description: Unauthorized

    post:
      tags:
        - Pokemon
      summary: Create a Pokémon for authenticated user
      security:
        - cognitoAuth:
            - openid
            - email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePokemonRequest'
      responses:
        '201':
          description: Pokémon created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PokemonResponse'
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '409':
          description: Pokémon already exists

  /users/me/pokemons/{id}:
    get:
      tags:
        - Pokemon
      summary: Get authenticated user's Pokémon details by ID
      security:
        - cognitoAuth:
            - openid
            - email
      parameters:
        - name: id
          in: path
          required: true
          description: Pokémon unique identifier
          schema:
            type: string
      responses:
        '200':
          description: Pokémon found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PokemonResponse'
        '401':
          description: Unauthorized
        '404':
          description: Pokémon not found

    put:
      tags:
        - Pokemon
      summary: Update authenticated user's Pokémon
      security:
        - cognitoAuth:
            - openid
            - email
      parameters:
        - name: id
          in: path
          required: true
          description: Pokémon unique identifier
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePokemonRequest'
      responses:
        '200':
          description: Pokémon updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PokemonResponse'
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '404':
          description: Pokémon not found

    delete:
      tags:
        - Pokemon
      summary: Delete authenticated user's Pokémon
      security:
        - cognitoAuth:
            - openid
            - email
      parameters:
        - name: id
          in: path
          required: true
          description: Pokémon unique identifier
          schema:
            type: string
      responses:
        '204':
          description: Pokémon deleted successfully
        '401':
          description: Unauthorized
        '404':
          description: Pokémon not found

  /users/me:
    get:
      tags:
        - User
      summary: Get authenticated user details
      security:
        - cognitoAuth:
            - openid
            - email
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
        '404':
          description: User not found

  /admin/users:
    post:
      tags:
        - User
      summary: Create a user
      description: Requires an authenticated admin user.
      security:
        - cognitoAuth:
            - openid
            - email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: User already exists

components:
  securitySchemes:
    cognitoAuth:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://eu-west-3h0xzhafid.auth.eu-west-3.amazoncognito.com/oauth2/authorize
          tokenUrl: https://eu-west-3h0xzhafid.auth.eu-west-3.amazoncognito.com/oauth2/token
          scopes:
            openid: OpenID scope
            email: Email scope

  schemas:
    CreatePokemonRequest:
      type: object
      required:
        - name
        - types
        - description
        - region
        - level
        - hp
        - attack
        - defense
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 50
          example: Pikachu
        types:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 3
            maxLength: 20
          example:
            - Electric
        description:
          type: string
          minLength: 10
          maxLength: 500
          example: Small yellow Pokémon able to generate electricity
        region:
          type: string
          minLength: 2
          maxLength: 50
          example: Kanto
        level:
          type: integer
          minimum: 80
          maximum: 120
          example: 100
        hp:
          type: integer
          minimum: 1
          example: 380
        attack:
          type: integer
          minimum: 1
          example: 250
        defense:
          type: integer
          minimum: 1
          example: 180

    UpdatePokemonRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 50
          example: Pikachu
        types:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 3
            maxLength: 20
          example:
            - Electric
        description:
          type: string
          minLength: 10
          maxLength: 500
          example: Updated electric Pokémon description
        region:
          type: string
          minLength: 2
          maxLength: 50
          example: Kanto
        level:
          type: integer
          minimum: 80
          maximum: 120
          example: 100
        hp:
          type: integer
          minimum: 1
          example: 400
        attack:
          type: integer
          minimum: 1
          example: 260
        defense:
          type: integer
          minimum: 1
          example: 190

    PokemonListResponse:
      type: object
      properties:
        id:
          type: string
          example: 018f6e4a-9b72-7f9a-bc41-82d4e8f9c123
        name:
          type: string
          example: Pikachu
        types:
          type: array
          items:
            type: string
          example:
            - Electric
        description:
          type: string
          example: Small yellow Pokémon able to generate electricity
        region:
          type: string
          example: Kanto

    PokemonResponse:
      allOf:
        - $ref: '#/components/schemas/PokemonListResponse'
        - type: object
          properties:
            level:
              type: integer
              example: 100
            hp:
              type: integer
              example: 380
            attack:
              type: integer
              example: 250
            defense:
              type: integer
              example: 180
            createdAt:
              type: string
              format: date-time
              example: 2026-04-18T10:00:00.000Z

    CreateUserRequest:
      type: object
      required:
        - email
        - nickname
      properties:
        email:
          type: string
          format: email
          minLength: 2
          maxLength: 255
          example: ash@example.com
        nickname:
          type: string
          minLength: 2
          maxLength: 70
          example: Ash

    UserResponse:
      type: object
      properties:
        id:
          type: string
          example: user-001
        email:
          type: string
          format: email
          example: ash@example.com
        nickname:
          type: string
          example: Ash
        createdAt:
          type: string
          format: date-time
          example: 2026-04-18T10:00:00.000Z